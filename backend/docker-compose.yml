services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scanlyr
    ports:
      - "5432:5432"
    volumes:
      - scanlyr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scanlyr"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      PYTHONPATH: /app
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me-use-openssl-rand-hex-32}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/scanlyr
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_SKIP_STARTUP_PING: "0"
      DB_REQUIRE_AT_STARTUP: "0"
      SKIP_MIGRATIONS: "0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  scanlyr_pgdata:
